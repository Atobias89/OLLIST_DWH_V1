          DBT_POSTGRESQL_USER: test_user
          DBT_POSTGRESQL_PASSWORD: test_password
          DBT_POSTGRESQL_PORT: 5432
          DBT_POSTGRESQL_DBNAME: test_db
          DBT_POSTGRESQL_SCHEMA: dbt_test_ci

      - name: Tester les données (utilise les tests dans schema.yml)
        run: dbt test --profiles-dir ./
        env:
          DBT_POSTGRESQL_HOST: localhost
          DBT_POSTGRESQL_USER: test_user
          DBT_POSTGRESQL_PASSWORD: test_password
          DBT_POSTGRESQL_PORT: 5432
          DBT_POSTGRESQL_DBNAME: test_db
          DBT_POSTGRESQL_SCHEMA: dbt_test_ci
      
      - name: Afficher les tables créées (debug)
        run: |
          PGPASSWORD=test_password psql -h localhost -U test_user -d test_db -c "\dt dbt_test_ci.*"
        env:
          PGPASSWORD: test_password
    
    generate_docs:
    name: Générer la documentation
    runs-on: ubuntu-latest
    needs: test_dbt
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Installer dbt
        run: pip install dbt-core dbt-postgres
      
      - name: Générer la documentation
        run: dbt docs generate --profiles-dir ./
        env:
          DBT_POSTGRESQL_HOST: localhost
          DBT_POSTGRESQL_USER: test_user
          DBT_POSTGRESQL_PASSWORD: test_password
          DBT_POSTGRESQL_PORT: 5432
          DBT_POSTGRESQL_DBNAME: test_db
          DBT_POSTGRESQL_SCHEMA: dbt_test_ci
      
      - name: Uploader la documentation
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: target/

