ollist_dwh_V1:
  outputs:
    dev:
      dbname: "{{ env_var('DB_NAME') | trim }}"
      host: "{{ env_var('DB_HOST') | trim }}"
      pass: "{{ env_var('DB_PASSWORD') | trim }}"
      port: "{{ env_var('DB_PORT') | int }}"
      schema: "{{ env_var('DB_SCHEMA') | trim }}"
      threads: 1
      type: postgres
      user: "{{ env_var('DB_USER') | trim }}"  # Ajouter | trim pour enlever les espaces
    
    ci :
      dbname: "{{ env_var('DB_NAME') | trim }}"
      host: "{{ env_var('DB_HOST') | trim }}"
      pass: "{{ env_var('DB_PASSWORD') | trim }}"
      port: "{{ env_var('DB_PORT') | int }}"
      schema: "{{ env_var('DB_SCHEMA') | trim }}"
      threads: 1
      type: postgres
      user: "{{ env_var('DB_USER') | trim }}"  # Ajouter | trim pour enlever les espaces
  target: dev